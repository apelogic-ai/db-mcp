[project]
name = "db-mcp-server"
version = "0.1.0"
description = "FastMCP server entry point for db-mcp"
requires-python = ">=3.13"
dependencies = [
    "db-mcp",
    "db-mcp-models",
    "db-mcp-knowledge",
    "db-mcp-data",
    "fastmcp>=2.0.0",
]

[project.scripts]
db-mcp-server = "db_mcp_server.server:main"

[tool.uv.sources]
db-mcp = { workspace = true }
db-mcp-models = { workspace = true }
db-mcp-knowledge = { workspace = true }
db-mcp-data = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/db_mcp_server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 99
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

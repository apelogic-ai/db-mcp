id: dune
title: Dune API
description: Dune SQL API connector with execute, status, and results endpoints.
base_url_prompt: Dune API base URL
env:
  - name: DUNE_API_KEY
    prompt: Dune API key
    secret: true
connector:
  spec_version: 1.0.0
  type: api
  profile: api_sql
  base_url: https://api.dune.com/api/v1
  auth:
    type: header
    header_name: X-DUNE-API-KEY
    token_env: DUNE_API_KEY
  pagination:
    type: none
  endpoints:
    - name: execute_sql
      path: /sql/execute
      method: POST
      body_mode: json
      response_mode: raw
    - name: execution_status
      path: /execution/{execution_id}/status
      method: GET
    - name: execution_results
      path: /execution/{execution_id}/results
      method: GET
  capabilities:
    supports_sql: true
    supports_validate_sql: false
    supports_async_jobs: false
    sql_mode: api_sync

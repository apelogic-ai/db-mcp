id: metabase
title: Metabase API
description: Metabase API-key connector for schema metadata and SQL execution via /api/dataset.
base_url_prompt: Metabase base URL
env:
  - name: X_API_KEY
    prompt: Metabase API key
    secret: true
connector:
  spec_version: 1.0.0
  type: api
  profile: hybrid_bi
  base_url: https://metabase.example.com
  api_title: Metabase
  auth:
    type: header
    header_name: x-api-key
    token_env: X_API_KEY
  pagination:
    type: none
  endpoints:
    - name: schema
      path: /api/database/1/schema
      method: GET
      response_mode: raw
    - name: execute_sql
      path: /api/dataset
      method: POST
      body_mode: json
      body_template:
        database: 1
        type: native
        native:
          query: "{{sql}}"
  capabilities:
    supports_sql: true
    supports_validate_sql: false
    supports_async_jobs: false
    sql_mode: api_sync
    supports_endpoint_discovery: true
    supports_dashboard_api: true

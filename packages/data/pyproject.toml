[project]
name = "db-mcp-data"
version = "0.1.0"
description = "db-mcp data layer: connectors, database abstraction, execution, validation, gateway"
requires-python = ">=3.13"
dependencies = [
    "db-mcp-models",
    "sqlalchemy>=2.0.0",
    "sqlglot>=26.0.0",
    "trino>=0.330.0",
    "clickhouse-sqlalchemy>=0.3.0",
    "psycopg2-binary>=2.9.0",
    "pymysql>=1.1.0",
    "pymssql>=2.2.0",
    "pyyaml>=6.0.0",
    "duckdb>=1.0.0",
    "requests>=2.28.0",
    "urllib3>=2.0.0",
    "opentelemetry-api>=1.20.0",
]

[tool.uv.sources]
db-mcp-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/db_mcp_data"]

[tool.ruff]
line-length = 99
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

id: superset
title: Apache Superset API
description: Superset API connector using JWT login for metadata discovery and SQL Lab execution.
base_url_prompt: Superset base URL
env:
  - name: SUPERSET_USERNAME
    prompt: Superset username
    secret: false
  - name: SUPERSET_PASSWORD
    prompt: Superset password
    secret: true
connector:
  spec_version: 1.0.0
  type: api
  profile: hybrid_bi
  base_url: https://superset.example.com
  api_title: Superset
  auth:
    type: jwt_login
    login_endpoint: /api/v1/security/login
    username_env: SUPERSET_USERNAME
    password_env: SUPERSET_PASSWORD
    token_field: access_token
    login_body:
      provider: db
      refresh: true
  pagination:
    type: none
  endpoints:
    - name: charts
      path: /api/v1/chart/
      method: GET
    - name: dashboards
      path: /api/v1/dashboard/
      method: GET
    - name: datasets
      path: /api/v1/dataset/
      method: GET
    - name: execute_sql
      path: /api/v1/sqllab/execute/
      method: POST
      body_mode: json
      body_template:
        database_id: "{{database_id}}"
        catalog: "{{sql_catalog}}"
        sql: "{{sql}}"
        runAsync: false
        json: true
      response_mode: raw
    - name: execution_results
      path: /api/v1/sqllab/results/
      method: GET
      response_mode: raw
    - name: create_chart
      path: /api/v1/chart/
      method: POST
      response_mode: raw
    - name: create_dashboard
      path: /api/v1/dashboard/
      method: POST
      response_mode: raw
    - name: create_dataset
      path: /api/v1/dataset/
      method: POST
      response_mode: raw
  capabilities:
    supports_sql: true
    supports_validate_sql: false
    supports_async_jobs: true
    sql_mode: api_sync

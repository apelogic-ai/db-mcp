[project]
name = "db-mcp-cli"
version = "0.1.0"
description = "Click CLI entry point for db-mcp"
requires-python = ">=3.13"
dependencies = [
    "db-mcp",
    "db-mcp-models",
    "db-mcp-knowledge",
    "db-mcp-data",
    "db-mcp-server",
    "click>=8.0.0",
    "rich>=13.0.0",
    "fastmcp>=2.0.0",
]

[project.optional-dependencies]
tui = ["textual>=0.60", "agent-client-protocol>=0.9.0"]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "textual-dev>=1.0.0",
]

[project.scripts]
db-mcp = "db_mcp_cli.main:main"

[tool.uv.sources]
db-mcp = { workspace = true }
db-mcp-models = { workspace = true }
db-mcp-knowledge = { workspace = true }
db-mcp-data = { workspace = true }
db-mcp-server = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/db_mcp_cli"]

[tool.ruff]
line-length = 99
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
